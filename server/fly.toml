# server/fly.toml
# ================
# Fly.io configuration for the King's Trial WebSocket relay server.
#
# Deploy:
#   cd server
#   fly deploy
#
# Monitor:
#   fly status --app kings-trial-server
#   fly logs   --app kings-trial-server

app = "kings-trial-server"
primary_region = "sin"          # Singapore — change to nearest region if preferred
                                # Other options: lhr (London), iad (Virginia),
                                # syd (Sydney), nrt (Tokyo)

[build]
  dockerfile = "Dockerfile"

[http_service]
  internal_port       = 8080
  force_https         = true    # Fly.io terminates TLS; game uses wss://
  auto_stop_machines  = "stop"  # Pause when idle to save credits
  auto_start_machines = true    # Wake on first connection
  min_machines_running = 0

  [[http_service.checks]]
    grace_period = "10s"
    interval     = "30s"
    method       = "GET"
    path         = "/"
    timeout      = "5s"

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
